name: Continuos Integretaion Delivery with gitHub

on:
  push:
    branches:
    - "main"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: |
          cd 05_DockerizingOurJavaApp/00_BeforeDockerization/rest-with-spring-boot-and-java-erudio
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACESS_TOKEN }}

      - name: Build Docker Image
        run: |
          cd 05_DockerizingOurJavaApp/00_BeforeDockerization/rest-with-spring-boot-and-java-erudio
          docker build -t ${{ secrets.DOCKER_USERNAME }}/spring-docker .
          
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/spring-docker