version: '3.4'
services:
    db:
        image: mysql:9.1.0
        restart: always
        environment:
            TZ: America/Sao_Paulo
            MYSQL_ROOT_PASSWORD: admin123
            MYSQL_DATABASE: rest_with_spring_boot_erudio
            MYSQL_USER: docker
            MYSQL_PASSWORD: admin123
        ports:
            - "3308:3306"
        expose:
            - "3306"
        networks: 
            - eduardo-network
    rest-with-spring-boot-erudio:
        image: edufleury/rest-with-spring-boot-erudio
        restart: always
        build: ./rest-with-spring-boot-and-java-erudio
        working_dir: /rest-with-spring-boot-and-java-erudio
        environment:
            TZ: America/Sao_Paulo
            SPRING.DATASOURCE.URL: jdbc:mysql://db:3306/rest_with_spring_boot_erudio?useTimezone=true&serverTimezone=UTC
            SPRING.DATASOURCE.USERNAME: root 
            SPRING.DATASOURCE.PASSWORD: admin123
        command:
            - mvn spring-boot:run
        depends_on:
            - db
        ports:
            - 80:80
        networks: 
            - eduardo-network
networks:
    eduardo-network:
        driver: bridge